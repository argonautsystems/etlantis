# etlantis CI — lint + import smoke + pytest + end-to-end example smoke.
# Phase 1 substrates are real, so the smoke jobs run real code now.

workflow:
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^(hive|zcbuild)/'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'
    - if: '$CI_COMMIT_TAG'

stages:
  - lint
  - test

default:
  before_script:
    - export PATH="/home/jasonperlow/.local/bin:$PATH"
    - uv --version
  tags:
    - argos
    - ncz-os

lint:ruff:
  stage: lint
  tags:
    - argos
    - ncz-os
  script:
    - export PATH="/home/jasonperlow/.local/bin:$PATH"
    # Ruff does not need the full project dependency graph; avoid making lint
    # depend on git-hosted/runtime packages that are irrelevant to style checks.
    - uvx --from 'ruff>=0.6.0' ruff check src/ tests/ examples/
    - uvx --from 'ruff>=0.6.0' ruff format --check src/ tests/ examples/
  allow_failure: false

test:import-smoke:
  stage: test
  tags:
    - argos
    - ncz-os
  script:
    - export PATH="/home/jasonperlow/.local/bin:$PATH"
    - uv sync
    - uv run python -c "import etlantis; print(f'etlantis {etlantis.__version__} import OK')"
    - uv run python -c "import etlantis.config, etlantis.ingest, etlantis.transform, etlantis.match, etlantis.score, etlantis.closures, etlantis.analytics, etlantis.geo, etlantis.pipeline, etlantis.enforcement; print('all subsystems import OK')"
  needs: [lint:ruff]

test:pytest:
  stage: test
  tags:
    - argos
    - ncz-os
  script:
    - export PATH="/home/jasonperlow/.local/bin:$PATH"
    - uv sync --extra dev
    - uv run pytest -q
  needs: [lint:ruff]
  allow_failure: false   # Phase 1 lands real tests; keep this required.

test:example-e2e:
  stage: test
  tags:
    - argos
    - ncz-os
  script:
    - export PATH="/home/jasonperlow/.local/bin:$PATH"
    - uv sync --extra dev
    # Drives every Phase 1 substrate (config + ingest + transform) end-to-end
    # against a loopback fixture server. No external network — deterministic
    # in CI. Hardening against latent integration regressions between unit
    # tests' mocks and real wire behavior.
    - uv run python examples/01_ingest_csv_to_parquet.py
    # Verify the parquet output round-trips back to a Polars frame with the
    # expected partition layout — guards against silent write-and-forget bugs.
    - uv run python -c "import polars as pl; df = pl.scan_parquet('/tmp/etlantis-example-out/parquet/inspections/**/*.parquet', hive_partitioning=True).collect(); assert df.height == 18, f'expected 18 rows, got {df.height}'; assert sorted(df['Status'].unique().to_list()) == ['emergency_close', 'routine_pass', 'routine_warn'], 'partition shape wrong'"
  needs: [lint:ruff]
  allow_failure: false
